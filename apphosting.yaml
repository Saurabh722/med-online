runConfig:
  minInstances: 0

env:
  - variable: MONGODB_URI
    secret: MONGODB_URI
    availability:
      - BUILD
      - RUNTIME
  - variable: ADMIN_USERNAME
    secret: ADMIN_USERNAME
    availability:
      - BUILD
      - RUNTIME
  - variable: ADMIN_PASSWORD
    secret: ADMIN_PASSWORD
    availability:
      - BUILD
      - RUNTIME
  - variable: ADMIN_SECRET
    secret: ADMIN_SECRET
    availability:
      - BUILD
      - RUNTIME
